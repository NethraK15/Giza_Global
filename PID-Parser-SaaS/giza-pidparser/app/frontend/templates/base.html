{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P & ID Parser</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> <!-- Font Awesome CDN -->
    {% block extra_head %}
    <style>
        .navbar-custom {
            background-color: #e0e0e0; /* Background color of the navbar */
        }
        .navbar-custom .navbar-nav .nav-link {
            color: #333; /* Darker text color for visibility */
        }
        .navbar-toggler {
            border: none; /* Remove default border */
        }
        .navbar-toggler-icon {
            background: none; /* Remove default background */
            font-size: 1.5em; /* Adjust icon size */
            color: #333; /* Icon color */
        }
        /* Hide the navbar when the body has the 'homepage' class */
        body.homepage #navigation-top {
            display: none !important;
        }
        .text-primary {
            color: #0072C6 !important;
        }
    
    </style>
    {% endblock %}
</head>
<body>
    {% if not request.path == '/login/' %}
    <nav id="navigation-top" class="navbar navbar-expand-lg navbar-custom">
        <a class="navbar-brand" href="#">
            <img src="{% static 'Giza_Global_Logo_SingleLine.png' %}" alt="Logo" style="max-height: 40px;">
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"><i class="fas fa-bars"></i></span> <!-- Font Awesome hamburger menu icon -->
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'about_models' %}">About Models</a>
                </li>
            </ul>
        </div>
    </nav>
    {% endif %}

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    {% block extra_scripts %}
    {% endblock %}
</body>
</html>
