{% extends 'base.html' %}
{% load static %}
{% block content %}
<body class="homepage" style="background-color: #ffffff;">
    <div class="container-fluid" style="margin-top: 50px; background: linear-gradient(to bottom, #d0d0d0, #e5e5e5); padding: 50px; border-radius: 10px;">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <!-- Logo Image -->
                <img src="{% static 'Giza_Global_Logo_SingleLine.png' %}" alt="Giza Global Solutions Logo" class="img-fluid" style="max-height: 150px; margin-top: 40px; margin-bottom: 20px;">
                <h1 class="display-4" style="color: #0072C6; font-weight: bold;">P & ID Parser</h1>
                <h4 style="color: #6c757d; font-weight: bold;">Automated Digitisation of P&IDs</h4>
            </div>
        </div>

        <div class="row justify-content-center" style="margin-top: 40px;">
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h3 class="card-title text-center" style="color: #0072C6; font-weight: bold;">Login</h3>
                        <form method="POST" action="{% url 'login' %}">
                            {% csrf_token %}
                            {% if messages %}
                                {% for message in messages %}
                                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert" style="font-weight: bold;">
                                        {{ message }}
                                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                            <span aria-hidden="true">&times;</span>
                                        </button>
                                    </div>
                                {% endfor %}
                            {% endif %}
                            <div class="form-group">
                                <label for="username" style="color: #0072C6; font-weight: bold;">Username</label>
                                <input type="text" id="username" name="username" class="form-control" placeholder="Enter username" required style="font-weight: bold;">
                            </div>
                            <div class="form-group">
                                <label for="password" style="color: #0072C6; font-weight: bold;">Password</label>
                                <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required style="font-weight: bold;">
                                <div class="form-check mt-2">
                                    <input type="checkbox" class="form-check-input" id="show-password">
                                    <label class="form-check-label" for="show-password" style="font-weight: bold;">Show Password</label>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block" style="background-color: #0072C6; border-color: #0072C6; font-weight: bold;">Login</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('show-password').addEventListener('change', function() {
            const passwordField = document.getElementById('password');
            passwordField.type = this.checked ? 'text' : 'password';
        });
    </script>
</body>
{% endblock %}
